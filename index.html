<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Countdown bis 02.07.2027</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: transparent;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .countdown-widget {
      background: #111827;
      color: #ffffff;
      border-radius: 20px;
      padding: 24px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
      text-align: center;
    }

    .title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 8px;
      opacity: 0.9;
    }

    .date {
      font-size: 0.95rem;
      opacity: 0.7;
      margin-bottom: 22px;
    }

    .timer {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .unit {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 18px 10px;
    }

    .value {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 8px;
    }

    .label {
      font-size: 0.85rem;
      opacity: 0.75;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .finished {
      font-size: 1.4rem;
      font-weight: 700;
      padding: 20px 0;
    }

    @media (max-width: 520px) {
      .timer {
        grid-template-columns: repeat(2, 1fr);
      }

      .value {
        font-size: 1.7rem;
      }
    }
  </style>
</head>
<body>
  <div class="countdown-widget">
    <div class="title">Countdown bis zum 2. Juli 2027</div>
    <div class="date">02.07.2027, 11:00 Uhr</div>

    <div class="timer" id="timer">
      <div class="unit">
        <div class="value" id="days">0</div>
        <div class="label">Tage</div>
      </div>
      <div class="unit">
        <div class="value" id="hours">0</div>
        <div class="label">Stunden</div>
      </div>
      <div class="unit">
        <div class="value" id="minutes">0</div>
        <div class="label">Minuten</div>
      </div>
      <div class="unit">
        <div class="value" id="seconds">0</div>
        <div class="label">Sekunden</div>
      </div>
    </div>
  </div>

  <script>
    const targetDate = new Date("2027-07-02T11:00:00");

    const daysEl = document.getElementById("days");
    const hoursEl = document.getElementById("hours");
    const minutesEl = document.getElementById("minutes");
    const secondsEl = document.getElementById("seconds");
    const timerEl = document.getElementById("timer");

    function updateCountdown() {
      const now = new Date();
      const difference = targetDate - now;

      if (difference <= 0) {
        timerEl.innerHTML = '<div class="finished">🎉 Das Datum ist erreicht!</div>';
        return;
      }

      const totalSeconds = Math.floor(difference / 1000);
      const days = Math.floor(totalSeconds / (60 * 60 * 24));
      const hours = Math.floor((totalSeconds % (60 * 60 * 24)) / (60 * 60));
      const minutes = Math.floor((totalSeconds % (60 * 60)) / 60);
      const seconds = totalSeconds % 60;

      daysEl.textContent = days;
      hoursEl.textContent = String(hours).padStart(2, "0");
      minutesEl.textContent = String(minutes).padStart(2, "0");
      secondsEl.textContent = String(seconds).padStart(2, "0");
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
